<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="en">
<head>
    <title>Protected Link</title>
    <style>
        body {
            font-family: Arial;
            background: rgba(0,0,0,0.6);
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
        }

        button {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="modal">
    <h3> Protected Link</h3>
    <p>Enter password to continue</p>

    <form method="post" th:action="@{/verify}">
        <input type="hidden" name="shortCode" th:value="${shortCode}" />
        <label>
            <input type="password" name="password" placeholder="Enter password" required />
        </label>

        <button type="submit">Unlock</button>
    </form>

    <div class="error" th:if="${error}" th:text="${error}"></div>
</div>

</body>
</html>
